<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="512" height="512" rx="64" fill="black"/>
  
  <!-- Subtle Grid Pattern -->
  <path d="M0 128H512M0 256H512M0 384H512M128 0V512M256 0V512M384 0V512" stroke="#1A1A1A" stroke-width="2"/>
  
  <!-- Outer Radar Ring -->
  <circle cx="256" cy="256" r="180" stroke="#6366F1" stroke-width="4" stroke-dasharray="12 12" opacity="0.3"/>
  
  <!-- Inner Target Halo -->
  <circle cx="256" cy="256" r="80" stroke="#6366F1" stroke-width="8" opacity="0.5">
    <animate attributeName="r" values="70;90;70" dur="3s" repeatCount="indefinite" />
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite" />
  </circle>

  <!-- The "Pin" (Geometric/Modern) -->
  <path d="M256 160L310 250H202L256 160Z" fill="#6366F1"/>
  <rect x="246" y="260" width="20" height="60" fill="#6366F1"/>
  <circle cx="256" cy="360" r="15" fill="#00FF00"/> <!-- Green "Active" Signal -->

  <!-- Terminal Corner Accents -->
  <path d="M40 80V40H80" stroke="#6366F1" stroke-width="8"/>
  <path d="M432 40H472V80" stroke="#6366F1" stroke-width="8"/>
  <path d="M472 432V472H432" stroke="#6366F1" stroke-width="8"/>
  <path d="M80 472H40V432" stroke="#6366F1" stroke-width="8"/>
</svg>